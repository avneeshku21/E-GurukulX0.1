services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduai-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8080
      ALLOWED_ORIGINS: http://localhost:3000
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"